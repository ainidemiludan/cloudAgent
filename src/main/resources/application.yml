spring:
  application:
    name: cloud-agent-platform
  datasource:
    url: jdbc:mysql://localhost:3306/cloud_agent?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: cloud_agent
    password: cloud_agent
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:http://localhost:8000}
      api-key: ${OPENAI_API_KEY:local-dev-key}
      chat:
        options:
          model: ${OPENAI_MODEL:qwen2.5-14b-instruct}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
