spring:
  application:
    name: cloud-agent-platform
  datasource:
    url: jdbc:mysql://localhost:3306/cloud_agent?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: cloud_agent
    password: cloud_agent
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

  ai:
    alibaba:
      dashscope:
        api-key: ${DASHSCOPE_API_KEY:mock-dashscope-key}
        chat:
          options:
            model: ${DASHSCOPE_MODEL:qwen-plus}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
    com.company.cloudagent: DEBUG
    org.springframework.web: INFO
    org.springframework.ai: INFO
    com.baomidou.mybatisplus: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
server:
  port: 8080

cloud-agent:
  mock:
    enabled: true
